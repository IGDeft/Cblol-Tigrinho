<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Draft Analysis</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080f18;
      --bg2:       #0c1622;
      --bg3:       #101e2e;
      --border:    #1a3048;
      --teal:      #00c9c9;
      --teal-dim:  #0a4a4a;
      --teal-glow: rgba(0,201,201,0.12);
      --red:       #e84040;
      --red-dim:   #3a1010;
      --green:     #3ecf6e;
      --gold:      #f0b429;
      --text:      #b8cfe0;
      --text-dim:  #4a6880;
      --text-hi:   #e8f4ff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── LAYOUT ── */
    .layout { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 210px; min-width: 210px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 16px 10px; gap: 8px;
      position: sticky; top: 0; height: 100vh; overflow: hidden;
    }

    .sidebar-logo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px; font-weight: 700;
      color: var(--teal);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0 4px 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    .sidebar-logo span { color: var(--text-dim); font-weight: 500; }

    .sidebar label {
      color: var(--text-dim); font-size: 10px;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 0 4px; margin-top: 4px;
    }

    .sidebar input, .sidebar select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 9px; border-radius: 4px;
      font-size: 12px; width: 100%;
      font-family: 'Inter', sans-serif;
      transition: border-color .15s;
    }
    .sidebar input:focus, .sidebar select:focus {
      outline: none; border-color: var(--teal);
    }
    .sidebar select option { background: var(--bg2); }

    .times-lista {
      overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 1px;
      margin-top: 4px;
    }
    .times-lista::-webkit-scrollbar { width: 3px; }
    .times-lista::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .time-item {
      padding: 7px 9px; border-radius: 3px;
      cursor: pointer; font-size: 12px;
      color: var(--text-dim);
      transition: all .12s;
      border-left: 2px solid transparent;
    }
    .time-item:hover { background: var(--bg3); color: var(--text); }
    .time-item.ativo {
      background: var(--teal-glow);
      color: var(--teal);
      border-left-color: var(--teal);
      font-weight: 600;
    }

    /* ── CONTENT ── */
    .content {
      flex: 1; padding: 20px;
      display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto; min-width: 0;
    }

    .empty {
      color: var(--text-dim); font-size: 15px;
      text-align: center; margin-top: 100px;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: 1px;
    }

    .loading {
      color: var(--teal); text-align: center;
      padding: 40px; font-size: 13px;
      letter-spacing: 2px; text-transform: uppercase;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── PAGE HEADER ── */
    .page-header {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 20px;
      display: flex; align-items: center; gap: 20px;
      flex-wrap: wrap;
    }

    .page-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px; font-weight: 700;
      color: var(--text-hi);
      letter-spacing: 1px;
    }

    .page-sub {
      color: var(--text-dim); font-size: 11px;
      margin-top: 2px; letter-spacing: .5px;
    }

    .pills { display: flex; gap: 8px; flex-wrap: wrap; }

    .pill {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 4px 10px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
    }
    .pill strong { color: var(--teal); margin-left: 4px; }

    /* ── TABS ── */
    .tabs {
      display: flex; gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 8px 18px; cursor: pointer;
      font-size: 12px; font-weight: 600;
      color: var(--text-dim);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: all .15s;
      text-transform: uppercase; letter-spacing: .8px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px;
    }
    .tab:hover { color: var(--text); }
    .tab.ativo { color: var(--teal); border-bottom-color: var(--teal); }

    .tab-content { display: none; flex-direction: column; gap: 14px; }
    .tab-content.ativo { display: flex; }

    /* ── GRID DE TABELAS ── */
    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 1100px) { .grid-3 { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 750px)  { .grid-3 { grid-template-columns: 1fr; } }

    /* ── CARD TABELA ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 5px;
      overflow: hidden;
    }

    .card-header {
      padding: 8px 13px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      display: flex; align-items: center; gap: 7px;
      border-bottom: 1px solid var(--border);
    }

    .card-header.azul  { background: #091828; color: #60b8e8; }
    .card-header.verde { background: #091a10; color: #3ecf6e; }
    .card-header.vermelho { background: #180909; color: #e84040; }

    .card-header .dot {
      width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0;
    }
    .azul .dot     { background: #60b8e8; box-shadow: 0 0 6px #60b8e8; }
    .verde .dot    { background: #3ecf6e; box-shadow: 0 0 6px #3ecf6e; }
    .vermelho .dot { background: #e84040; box-shadow: 0 0 6px #e84040; }

    /* ── TABELA ── */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }

    th {
      background: var(--bg);
      color: var(--text-dim);
      text-align: left; padding: 5px 10px;
      font-size: 10px; text-transform: uppercase;
      letter-spacing: .5px; font-weight: 600;
      white-space: nowrap;
    }

    td {
      padding: 5px 10px;
      border-top: 1px solid #0d1e2e;
      white-space: nowrap;
    }

    tr:hover td { background: rgba(0,201,201,0.04); }
    td:first-child { color: var(--text-hi); font-weight: 500; }

    /* ── BARRA ── */
    .bar-cell { display: flex; align-items: center; gap: 6px; min-width: 80px; }
    .bar-wrap  { flex: 1; height: 4px; background: #0d1e2e; border-radius: 2px; min-width: 30px; }
    .bar-fill  { height: 4px; border-radius: 2px; }
    .bar-teal  { background: var(--teal); }
    .bar-red   { background: var(--red); }
    .bar-green { background: var(--green); }
    .bar-gold  { background: var(--gold); }
    .bar-pct   { min-width: 34px; text-align: right; font-size: 11px; color: var(--text-dim); }

    /* ── CORES DE VALOR ── */
    .val-teal  { color: var(--teal); }
    .val-green { color: var(--green); }
    .val-red   { color: var(--red); }
    .val-gold  { color: var(--gold); }
    .val-dim   { color: var(--text-dim); }

    /* ── WIN RATE BADGE ── */
    .wr-badge {
      display: inline-block;
      padding: 1px 6px; border-radius: 3px;
      font-size: 11px; font-weight: 600;
    }
    .wr-hi  { background: rgba(62,207,110,.15); color: var(--green); }
    .wr-mid { background: rgba(240,180,41,.1);  color: var(--gold); }
    .wr-lo  { background: rgba(232,64,64,.15);  color: var(--red); }
  </style>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">Draft<span>Lab</span></div>
    <label>Buscar time</label>
    <input id="buscaTime" placeholder="Nome do time..." oninput="filtrarTimes()">
    <label>Temporada</label>
    <select id="anoSelect">
      <option value="">Todas</option>
      <option value="2025">2025</option>
      <option value="2026" selected>2026</option>
    </select>
    <label style="margin-top:10px">Times</label>
    <div class="times-lista" id="listaTimesEl"></div>
  </aside>

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="empty">← Selecione um time</div>
  </div>

</div>

<script>
const API = 'http://localhost:5000';
let todosOsTimes = [];
let timeSelecionado = '';

// ── Init ──────────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch(`${API}/times`);
    todosOsTimes = await r.json();
    renderTimes(todosOsTimes);
  } catch(e) {
    document.getElementById('listaTimesEl').innerHTML =
      '<div style="color:var(--red);padding:8px;font-size:11px">Erro ao conectar (porta 5000)</div>';
  }
}

function filtrarTimes() {
  const b = document.getElementById('buscaTime').value.toLowerCase();
  renderTimes(todosOsTimes.filter(t => t.toLowerCase().includes(b)));
}

function renderTimes(lista) {
  document.getElementById('listaTimesEl').innerHTML = lista.map(t =>
    `<div class="time-item${t===timeSelecionado?' ativo':''}" onclick="carregarTime('${t.replace(/'/g,"\\'")}')">${t}</div>`
  ).join('');
}

// ── Carregar ──────────────────────────────────────────────
async function carregarTime(nome) {
  timeSelecionado = nome;
  filtrarTimes();
  const c = document.getElementById('content');
  c.innerHTML = '<div class="loading">Carregando...</div>';

  const ano = document.getElementById('anoSelect').value;
  const enc = encodeURIComponent(nome);
  const url = `${API}/stats/draft?nome=${enc}${ano ? '&ano='+ano : ''}`;

  try {
    const d = await fetch(url).then(r => r.json());
    if (d.detail) throw new Error(d.detail);
    renderAnalise(d);
  } catch(e) {
    c.innerHTML = `<div class="empty" style="color:var(--red)">Erro: ${e.message}</div>`;
  }
}

// ── Render principal ──────────────────────────────────────
function renderAnalise(d) {
  const c = document.getElementById('content');
  const anoLabel = d.ano ? `Temporada ${d.ano}` : 'Todas as temporadas';

  c.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">${d.time}</div>
        <div class="page-sub">${anoLabel}</div>
      </div>
      <div class="pills">
        <div class="pill">Total <strong>${d.geral.jogos}</strong></div>
        <div class="pill">FP (Azul) <strong>${d.fp.jogos}</strong></div>
        <div class="pill">LP (Vermelho) <strong>${d.lp.jogos}</strong></div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab ativo" onclick="trocarAba('geral',this)">Geral</div>
      <div class="tab"       onclick="trocarAba('fp',this)">First Pick</div>
      <div class="tab"       onclick="trocarAba('lp',this)">Last Pick</div>
    </div>

    <div id="aba-geral" class="tab-content ativo">${renderBloco(d.geral)}</div>
    <div id="aba-fp"    class="tab-content">${renderBloco(d.fp)}</div>
    <div id="aba-lp"    class="tab-content">${renderBloco(d.lp)}</div>
  `;
}

function trocarAba(nome, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('ativo'));
  el.classList.add('ativo');
  document.getElementById('aba-' + nome).classList.add('ativo');
}

// ── Bloco (3 tabelas lado a lado) ────────────────────────
function renderBloco(bloco) {
  return `
    <div class="grid-3">
      <div class="card">
        <div class="card-header verde"><span class="dot"></span>Picks do Time</div>
        ${tabelaPicks(bloco.picks)}
      </div>
      <div class="card">
        <div class="card-header azul"><span class="dot"></span>Seus Bans</div>
        ${tabelaBans(bloco.seus_bans, 'teal')}
      </div>
      <div class="card">
        <div class="card-header vermelho"><span class="dot"></span>Bans contra você</div>
        ${tabelaBans(bloco.bans_contra, 'red')}
      </div>
    </div>
  `;
}

// ── Tabela de Picks ───────────────────────────────────────
function tabelaPicks(lista) {
  if (!lista?.length) return vazio();
  const maxPicks = lista[0]?.picks ?? 1;

  const linhas = lista.map(row => {
    const wr = row.win_rate ?? 0;
    const barW = Math.min(100, Math.round((row.picks / maxPicks) * 100));
    const wrClass = wr >= 60 ? 'wr-hi' : wr >= 45 ? 'wr-mid' : 'wr-lo';
    return `
      <tr>
        <td>${row.champion}</td>
        <td>
          <div class="bar-cell">
            <div class="bar-wrap"><div class="bar-fill bar-green" style="width:${barW}%"></div></div>
            <span class="bar-pct val-dim">${row.pick_rate}%</span>
          </div>
        </td>
        <td class="val-dim">${row.picks}</td>
        <td><span class="wr-badge ${wrClass}">${wr}%</span></td>
      </tr>`;
  }).join('');

  return `<table>
    <thead><tr>
      <th>Campeão</th><th>Pick Rate</th><th>#</th><th>Win Rate</th>
    </tr></thead>
    <tbody>${linhas}</tbody>
  </table>`;
}

// ── Tabela de Bans ────────────────────────────────────────
function tabelaBans(lista, cor) {
  if (!lista?.length) return vazio();
  const maxVal = lista[0]?.bans_f1 ?? 1;
  const barClass = cor === 'red' ? 'bar-red' : 'bar-teal';

  const linhas = lista.map(row => {
    const barW = Math.min(100, Math.round((row.bans_f1 / maxVal) * 100));
    return `
      <tr>
        <td>${row.champion}</td>
        <td>
          <div class="bar-cell">
            <div class="bar-wrap"><div class="bar-fill ${barClass}" style="width:${barW}%"></div></div>
            <span class="bar-pct">${row.pct_bans_f1}%</span>
          </div>
        </td>
        <td class="val-dim">${row.bans_f1}</td>
        <td class="val-dim">${row.pct_bans_totais}%</td>
        <td class="val-dim">${row.bans_totais}</td>
      </tr>`;
  }).join('');

  return `<table>
    <thead><tr>
      <th>Campeão</th><th>% F1</th><th>#F1</th><th>% Tot</th><th>#Tot</th>
    </tr></thead>
    <tbody>${linhas}</tbody>
  </table>`;
}

function vazio() {
  return '<div style="padding:14px;color:var(--text-dim);font-size:12px">Sem dados</div>';
}

// Recarregar ao trocar ano
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('anoSelect').addEventListener('change', () => {
    if (timeSelecionado) carregarTime(timeSelecionado);
  });
});

init();
</script>
</body>
</html>
